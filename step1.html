<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>segment 1</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #2E3440;
            --text-color: #D8DEE9;
            --button-border: #4C566A;
            --link-color: #A3BE8C;
            

            --node-alpha: #6e75;
            --node-beta: #6c73;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'JetBrains Mono', monospace;
            padding: 40px;
        }

        .terminal-box {
            background: #242933;
            border: 1px solid var(--button-border);
            padding: 20px;
            max-width: 500px;
        }

        input {
            background: #3B4252;
            color: #A3BE8C;
            border: 1px solid var(--button-border);
            padding: 8px;
            font-family: inherit;
            width: 100%;
            margin-top: 15px;
            outline: none;
        }

        input:invalid:not(:placeholder-shown) {
            border-color: #BF616A;
        }

        .next-btn {
            display: none;
            margin-top: 20px;
            color: #EBCB8B;
            text-decoration: none;
            font-weight: bold;
        }

        input:valid ~ .next-btn {
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="terminal-box">
        <p>ok so you're curious. well check the source of the main site and find the anomaly</p>
        
        <div>
            <input type="text" pattern="0000DD" placeholder="enter what you've found..." required>
            <a href="step2.html" class="next-btn">[+] Good Work_.</a>
        </div>
    </div>
</body>
</html>
